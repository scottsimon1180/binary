<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="images/logo-1024.png">
<link rel="apple-touch-icon" href="images/logo-1024.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SVG Tool">
<meta name="theme-color" content="#1a1a1e">
<title>SVG Tool</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="mode-mono">

  <iframe id="cpIframe" src="colorPicker.html" style="position: fixed; inset: 0; width: 100%; height: 100%; border: none; z-index: 9999; background: transparent; pointer-events: none;"></iframe>

  <div id="resizePanel" class="floating-panel">
    <div class="fp-header" id="resizePanelHeader">
       <div class="fp-title">Edit Dimensions</div>
       <div class="fp-header-actions">
          <div class="fp-reset-btn" id="btnResizeUndo" onclick="resizeUndo()" title="Undo"><svg class="icon-svg"><use href="#icon-undo" xlink:href="#icon-undo"></use></svg></div>
          <div class="fp-reset-btn" id="btnResizeRedo" onclick="resizeRedo()" title="Redo"><svg class="icon-svg"><use href="#icon-redo" xlink:href="#icon-redo"></use></svg></div>
       </div>
    </div>
    <div class="fp-body">
       
       <div class="fp-section">
          <div class="fp-section-header">
             <div class="fp-section-title">Artboard (ViewBox)</div>
             <div class="fp-reset-btn inline" onclick="resetDimensions('ab')" title="Reset Artboard Dimensions"><svg class="icon-svg"><use href="#icon-reset" xlink:href="#icon-reset"></use></svg></div>
          </div>
          <div class="fp-row">
             <div class="fp-input-group"><span class="fp-scrub" id="scrubAbW">W</span><input type="number" id="inpAbW" class="fp-input"></div>
             <div class="fp-lock" id="btnLockAb" onclick="toggleLock('ab')" title="Lock Aspect Ratio"><svg class="icon-svg"><use href="#icon-lock" xlink:href="#icon-lock"></use></svg></div>
             <div class="fp-input-group"><span class="fp-scrub" id="scrubAbH">H</span><input type="number" id="inpAbH" class="fp-input"></div>
          </div>
       </div>

       <div class="fp-divider-row">
          <div class="fp-divider-line"></div>
          <div class="fp-link-btn-standalone" id="btnLinkAbInk" onclick="toggleLock('link')" title="Link Artboard and Ink Scaling">
             <svg class="icon-svg"><use href="#icon-linked-layers" xlink:href="#icon-linked-layers"></use></svg>
          </div>
          <div class="fp-divider-line"></div>
       </div>
       
       <div class="fp-section">
          <div class="fp-section-header">
             <div class="fp-section-title">Ink Bounds</div>
             <div class="fp-reset-btn inline" onclick="resetDimensions('ink')" title="Reset Ink Dimensions"><svg class="icon-svg"><use href="#icon-reset" xlink:href="#icon-reset"></use></svg></div>
          </div>
          <div class="fp-row">
             <div class="fp-input-group"><span class="fp-scrub" id="scrubInkW">W</span><input type="number" id="inpInkW" class="fp-input"></div>
             <div class="fp-lock" id="btnLockInk" onclick="toggleLock('ink')" title="Lock Aspect Ratio"><svg class="icon-svg"><use href="#icon-lock" xlink:href="#icon-lock"></use></svg></div>
             <div class="fp-input-group"><span class="fp-scrub" id="scrubInkH">H</span><input type="number" id="inpInkH" class="fp-input"></div>
          </div>
       </div>
       
       <div class="fp-section" style="margin-top: 6px;">
          <div class="fp-section-title">Alignment & Fit</div>
          <div class="fp-row">
             <button class="icon-btn" onclick="alignCenter('h')" title="Align Horizontal Center"><svg class="icon-svg"><use href="#icon-align-horizontal-center" xlink:href="#icon-align-horizontal-center"></use></svg></button>
             <button class="icon-btn" onclick="alignCenter('v')" title="Align Vertical Center"><svg class="icon-svg"><use href="#icon-align-vertical-center" xlink:href="#icon-align-vertical-center"></use></svg></button>
             <button class="opt-btn" onclick="fitToBounds()" title="Fit Artboard to Ink Bounds" style="margin-left: auto;">Fit to Bounds</button>
          </div>
       </div>

    </div>
    <div class="fp-footer">
       <button class="standard" onclick="cancelResize()">Cancel</button>
       <button class="primary" onclick="confirmResize()">OK</button>
    </div>
  </div>

  <h2>SVG Optimizer</h2>

  <div class="layout-wrapper">
    <div class="panel">
      <div class="panel-header-row">
        <h3 class="panel-header">SVG Preview</h3>
        <div class="options-bar">
          <span class="opt-label">Path Color:</span>
          <button id="btnMono" class="opt-btn active" onclick="setColorMode('mono')">Use CSS</button>
          <button id="btnLocal" class="opt-btn" onclick="setColorMode('local')">Preserve Original</button>
          <div class="options-divider"></div>
          <button class="icon-btn" onclick="location.reload()" title="Refresh Webpage" style="border:none; background:transparent;">
            <svg class="icon-svg"><use href="#icon-refresh" xlink:href="#icon-refresh"></use></svg>
          </button>
        </div>
      </div>

      <div class="preview-container">
        <div class="side-panel panel-artboard">
          <h4 class="panel-title">
            Artboard
            <div class="layer-toggle" onclick="openResizePanel()" title="Edit Dimensions">
              <svg class="icon-svg"><use href="#icon-edit" xlink:href="#icon-edit"></use></svg>
            </div>
          </h4>
          <div class="detail-item"><span>Width:</span><strong id="detVbW">-</strong></div>
          <div class="detail-item"><span>Height:</span><strong id="detVbH">-</strong></div>
          <h4 class="panel-title" style="margin-top: 8px; border:none; padding-bottom:0;">Ink Bounds</h4>
          <div class="detail-item"><span>Width:</span><strong id="detObjW">-</strong></div>
          <div class="detail-item"><span>Height:</span><strong id="detObjH">-</strong></div>
        </div>

        <div class="preview-box" id="previewArea">
          <div id="btnZoomToggle" class="zoom-toggle" onclick="toggleZoom()" title="Toggle Zoom Mode">
            <svg class="icon-svg"><use href="#icon-zoom-size" xlink:href="#icon-zoom-size"></use></svg>
          </div>
        </div>
        
        <div class="side-panel panel-layers">
          
          <div class="panel-header-flex">
            <div style="display: flex; align-items: center; gap: 8px;">
              <h4 class="panel-title" style="border:none; margin:0; padding:0;">Layers</h4>
              <div id="btnLinkLayers" class="layer-toggle" style="display: none;" onclick="toggleLinkLayers()" title="Link All Layers">
                <svg class="icon-svg"><use href="#icon-unlinked-layers" xlink:href="#icon-unlinked-layers"></use></svg>
              </div>
            </div>
            <div class="layer-toggle" onclick="resetAllLayers()" title="Reset All Layers">
              <svg class="icon-svg"><use href="#icon-reset" xlink:href="#icon-reset"></use></svg>
            </div>
          </div>
          
          <div class="layers-wrap" id="layersWrap">
            <div class="layers-list" id="layersList">
               <div style="font-size: 11px; color: var(--text-secondary); text-align: center; margin-top: 30px;">Import SVG to view layers</div>
            </div>
            <div class="custom-scroll-track">
              <div class="custom-scroll-thumb"></div>
            </div>
          </div>

        </div>
      </div>
    </div>

    <div class="io-grid">
      <div class="panel">
        <h3 class="panel-header">Import</h3>
        <div class="controls">
          <label class="opt-btn">
            <svg class="icon-svg"><use href="#icon-folder" xlink:href="#icon-folder"></use></svg> Select .svg File
            <input type="file" id="fileInput" accept=".svg">
          </label>
          <button class="opt-btn" onclick="focusAndSelectSVG(this)">
            <svg class="icon-svg"><use href="#icon-paste" xlink:href="#icon-paste"></use></svg> Paste Code
          </button>
          <button class="opt-btn" style="margin-left: auto;" onclick="clearSVG(this)">
            <svg class="icon-svg"><use href="#icon-clear" xlink:href="#icon-clear"></use></svg> Clear
          </button>
        </div>
        <div class="textarea-wrap" id="importWrap">
          <textarea id="inputStr" placeholder="Paste raw SVG from Illustrator here..."></textarea>
          <div class="custom-scroll-track">
            <div class="custom-scroll-thumb"></div>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header-row">
          <h3 class="panel-header">Export</h3>
          <div class="export-format-toggle">
            <label class="radio-label"><input type="radio" name="exportFormat" value="svg" checked onchange="toggleExportFormat()"> <span class="radio-custom"></span> SVG</label>
            <label class="radio-label"><input type="radio" name="exportFormat" value="png" onchange="toggleExportFormat()"> <span class="radio-custom"></span> PNG</label>
          </div>
        </div>
        <div class="controls" id="exportControlsWrapper" style="flex-wrap: wrap;">
          <button id="btnCopyExport" class="opt-btn" onclick="copyOutput(this)" style="justify-content: flex-start; width: 172px;">
            <svg class="icon-svg"><use href="#icon-copy" xlink:href="#icon-copy"></use></svg> <span style="width: 100%; text-align: left;">Copy to Clipboard</span>
          </button>
          <button id="btnSaveExport" class="opt-btn" onclick="executeExport()">
            <svg class="icon-svg"><use href="#icon-share" xlink:href="#icon-share"></use></svg> <span>Save .svg</span>
          </button>
        </div>
        
        <div class="textarea-wrap" id="exportWrap">
          <textarea id="outputStr" readonly placeholder="Optimized HTML-ready SVG will appear here..."></textarea>
          <div class="custom-scroll-track">
            <div class="custom-scroll-thumb"></div>
          </div>
        </div>

        <div class="png-framed-wrap" id="pngExportWrap" style="display: none;">
            <div class="png-left-col">
                
                <div class="dim-header-row">
                    <span class="dim-label">SIZE</span>
                    <label class="cb-label">
                      <input type="checkbox" id="pngHoldRes" onchange="handlePngHoldToggle(this.checked)"> <span class="cb-custom"></span> Hold
                    </label>
                </div>
                
                <div class="dim-row">
                    <span class="sub-label">Width:</span>
                    <div class="dim-group">
                        <input type="number" id="pngW" class="dim-input" oninput="handlePngDimChange('w')">
                        <span class="dim-unit">px</span>
                    </div>
                </div>
                <div class="dim-row">
                    <span class="sub-label">Height:</span>
                    <div class="dim-group">
                        <input type="number" id="pngH" class="dim-input" oninput="handlePngDimChange('h')">
                        <span class="dim-unit">px</span>
                    </div>
                </div>
                
                <div class="png-divider"></div>
                
                <div class="bg-header-row">
                    <span class="dim-label">BACKGROUND</span>
                    <label class="cb-label">
                      <input type="checkbox" id="pngClipBounds" onchange="handlePngClipToggle(this.checked)"> <span class="cb-custom"></span> Clip to Ink Bounds
                    </label>
                </div>
                
                <div class="bg-preset-row">
                    <button class="bg-preset-btn active bg-transparent-btn checkerboard-bg" data-bg="transparent" onclick="setPngBg('transparent')" title="Transparent"></button>
                    <button class="bg-preset-btn" data-bg="#000000" onclick="setPngBg('#000000')" title="Black" style="background: #000000;"></button>
                    <button class="bg-preset-btn" data-bg="#ffffff" onclick="setPngBg('#ffffff')" title="White" style="background: #ffffff;"></button>
                    
                    <button class="bg-preset-btn" id="btnCustomPngBg" onclick="openPngBgPicker()" title="Custom Color/Gradient">
                        <div class="png-picker-center" id="customPngBgCenter"></div>
                    </button>
                </div>
                
            </div>
            
            <div class="png-right-col">
                <div class="png-preview-box" id="pngPreviewBox">
                    <img id="pngPreviewImg" class="checkerboard-bg">
                </div>
            </div>
        </div>
      </div>
    </div>
  </div>

<script src="ICONS (linked).js"></script>
<script src="script.js"></script>
</body>
</html>
